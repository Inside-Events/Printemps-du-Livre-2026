
<style>
*{box-sizing:border-box;margin:0;padding:0;}
.wrap{background:#FFE000;font-family:'Arial Black',Arial,sans-serif;padding:0 0 2rem;}
.hero{padding:2rem 1.5rem 1.5rem;display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:1rem;}
.hero-left{}
.hero-dates{font-size:38px;font-weight:900;color:#111;line-height:1.05;letter-spacing:-1px;}
.hero-name{font-size:13px;font-weight:700;color:#111;letter-spacing:0.08em;margin-top:6px;}
.hero-name span{color:#D4006A;}
.hero-sub{font-size:11px;color:#555;font-weight:400;margin-top:2px;font-family:Arial,sans-serif;}
.day-nav{display:flex;gap:6px;padding:0 1.5rem 1.25rem;flex-wrap:wrap;}
.day-btn{font-size:12px;font-weight:700;padding:7px 16px;border:2px solid #111;border-radius:0;background:transparent;color:#111;cursor:pointer;letter-spacing:0.05em;font-family:'Arial Black',Arial,sans-serif;transition:background 0.12s;}
.day-btn.active{background:#111;color:#FFE000;}
.day-btn:hover:not(.active){background:rgba(0,0,0,0.08);}
.sessions-list{padding:0 1.5rem;}
.day-group{margin-bottom:2rem;}
.day-header{font-size:11px;font-weight:700;letter-spacing:0.15em;color:#111;border-top:2px solid #111;padding-top:10px;margin-bottom:12px;font-family:'Arial Black',Arial,sans-serif;}
.card{background:#fff;border:none;border-radius:0;padding:1rem 1.25rem;margin-bottom:8px;display:flex;gap:14px;align-items:flex-start;border-left:4px solid #FFE000;}
.card.rencontre{border-left-color:#D4006A;}
.card.soiree{border-left-color:#111;}
.card.exposition{border-left-color:#EF9F27;}
.card.atelier{border-left-color:#1D9E75;}
.card.concert{border-left-color:#534AB7;}
.card.projection{border-left-color:#111;}
.card-time{font-size:22px;font-weight:900;color:#111;min-width:52px;line-height:1;padding-top:2px;font-family:'Arial Black',Arial,sans-serif;}
.card-body{flex:1;min-width:0;}
.card-cat{font-size:10px;font-weight:700;letter-spacing:0.12em;color:#888;font-family:Arial,sans-serif;margin-bottom:3px;}
.card-title{font-size:15px;font-weight:900;color:#111;line-height:1.2;font-family:'Arial Black',Arial,sans-serif;}
.card-detail{font-size:12px;color:#555;margin-top:4px;font-family:Arial,sans-serif;}
.card-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;background:#FFE000;color:#111;margin-top:5px;letter-spacing:0.06em;}
.card-badge.tarif{background:#D4006A;color:#fff;}
.legend{display:flex;gap:14px;flex-wrap:wrap;padding:0 1.5rem 1.25rem;margin-top:-0.5rem;}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#111;font-family:Arial,sans-serif;font-weight:700;}
.leg-dot{width:10px;height:10px;flex-shrink:0;}
</style>

<div class="wrap">
  <div class="hero">
    <div class="hero-left">
      <div class="hero-dates">8·9·10<br>MAI 2026</div>
      <div class="hero-name">Le <span>Printemps du Livre</span> de Montaigu</div>
      <div class="hero-sub" style="font-family:Arial,sans-serif;font-weight:400;">Terres de Montaigu · Vendée</div>
    </div>
    <div style="font-size:11px;color:#333;font-family:Arial,sans-serif;font-weight:700;text-align:right;line-height:1.8;">
      <div>+ Exposition</div>
      <div>15 avr → 15 mai</div>
      <div style="color:#888;font-weight:400;">Médiathèque Calliopé</div>
    </div>
  </div>

  <div class="day-nav" id="nav">
    <button class="day-btn active" onclick="filter('all',this)">Tout le programme</button>
    <button class="day-btn" onclick="filter('08',this)">Vendredi 8 mai</button>
    <button class="day-btn" onclick="filter('09',this)">Samedi 9 mai</button>
    <button class="day-btn" onclick="filter('10',this)">Dimanche 10 mai</button>
  </div>

  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#D4006A"></div>Rencontre</div>
    <div class="leg"><div class="leg-dot" style="background:#111"></div>Soirée</div>
    <div class="leg"><div class="leg-dot" style="background:#EF9F27"></div>Exposition</div>
    <div class="leg"><div class="leg-dot" style="background:#1D9E75"></div>Atelier</div>
    <div class="leg"><div class="leg-dot" style="background:#534AB7"></div>Concert</div>
  </div>

  <div class="sessions-list" id="sessions"></div>
</div>

<script>
const DATA = [
  {day:'08',time:'10h',title:'Projection et master class avec Olivier Casas',cat:'projection',cls:'projection',detail:'',badge:''},
  {day:'08',time:'10h',title:'Atelier avec l\'illustratrice Carine Hinder',cat:'Atelier créatif',cls:'atelier',detail:'',badge:''},
  {day:'08',time:'10h30',title:'Une heure avec Michel Bussi',cat:'Rencontre',cls:'rencontre',detail:'',badge:''},
  {day:'08',time:'16h',title:'Visites flash de l\'exposition animées',cat:'Exposition',cls:'exposition',detail:'Univers de Brume et son cochon Hubert',badge:''},
  {day:'08',time:'19h',title:'Une heure avec Liane Foly',cat:'Rencontre',cls:'rencontre',detail:'19h – 20h',badge:''},
  {day:'08',time:'20h30',title:'Lecture musicale : Olivia Ruiz et ses musiciens',cat:'Soirée',cls:'soiree',detail:'Thalie',badge:'10 €'},
  {day:'09',time:'14h',title:'Une heure avec Marie Vareille',cat:'Rencontre',cls:'rencontre',detail:'',badge:''},
  {day:'09',time:'14h',title:'Projection et rencontre avec Didier Decoin',cat:'Rencontre',cls:'rencontre',detail:'',badge:''},
  {day:'09',time:'16h',title:'Visites flash de l\'exposition animées',cat:'Exposition',cls:'exposition',detail:'Plusieurs créneaux : 16h et 17h',badge:''},
  {day:'09',time:'16h30',title:'Une heure avec Yasmina Khadra',cat:'Rencontre',cls:'rencontre',detail:'',badge:''},
  {day:'09',time:'18h30',title:'Concert dessiné au Cinéma Grand Écran',cat:'Concert dessiné',cls:'concert',detail:'',badge:''},
  {day:'10',time:'11h30',title:'Une heure avec Éric-Emmanuel Schmitt',cat:'Rencontre',cls:'rencontre',detail:'11h30 – 12h30',badge:''},
  {day:'10',time:'15h30',title:'Une heure avec Laure Manel',cat:'Rencontre',cls:'rencontre',detail:'15h30 – 16h30',badge:''},
];

const DAY_LABELS = {'08':'Vendredi 8 mai','09':'Samedi 9 mai','10':'Dimanche 10 mai'};
let currentDay = 'all';

function filter(day, btn) {
  currentDay = day;
  document.querySelectorAll('.day-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const days = currentDay === 'all' ? ['08','09','10'] : [currentDay];
  let html = '';
  days.forEach(d => {
    const items = DATA.filter(s => s.day === d);
    if (!items.length) return;
    html += `<div class="day-group"><div class="day-header">${DAY_LABELS[d]}</div>`;
    items.forEach(s => {
      const badge = s.badge ? `<span class="card-badge tarif">${s.badge}</span>` : '';
      const detail = s.detail ? `<div class="card-detail">${s.detail}</div>` : '';
      html += `<div class="card ${s.cls}">
        <div class="card-time">${s.time}</div>
        <div class="card-body">
          <div class="card-cat">${s.cat.toUpperCase()}</div>
          <div class="card-title">${s.title}</div>
          ${detail}${badge}
        </div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('sessions').innerHTML = html;
}

render();
</script>
