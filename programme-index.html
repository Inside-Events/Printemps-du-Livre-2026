const DAY_LABELS = {'08':'Vendredi 8 mai','09':'Samedi 9 mai','10':'Dimanche 10 mai'};
const CAT_LABELS = {
  rencontre:'Rencontre', spectacle:'Spectacle', atelier:'Atelier',
  musical:'Musique', projection:'Cinéma', exposition:'Visite'
};

const state = { day:'all', cats:new Set(), query:'' };

function normalize(s){
  return (s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
}

function matches(ev){
  if(state.day !== 'all' && ev.day !== state.day) return false;

  if(state.cats.size > 0){
    let ok = false;
    for(const c of state.cats){
      if(c === 'fort'){
        if((ev.tags||[]).includes('fort')) { ok = true; break; }
      } else if(c === 'jeunesse'){
        if((ev.tags||[]).includes('jeunesse')) { ok = true; break; }
      } else {
        if(ev.cat === c) { ok = true; break; }
      }
    }
    if(!ok) return false;
  }

  if(state.query){
    const q = normalize(state.query);
    const haystack = normalize(ev.title + ' ' + (ev.detail||'') + ' ' + (ev.lieu||''));
    if(!haystack.includes(q)) return false;
  }

  return true;
}

function timeToMinutes(t){
  if(!t) return 9999;
  const m = t.match(/(\d+)h(\d*)/);
  if(!m) return 9999;
  return parseInt(m[1])*60 + (m[2] ? parseInt(m[2]) : 0);
}

function render(){
  const filtered = EVENTS.filter(matches);

  document.getElementById('count').textContent =
    filtered.length === 0 ? 'Aucun résultat' :
    filtered.length === 1 ? '1 événement' :
    filtered.length + ' événements';

  if(filtered.length === 0){
    document.getElementById('sessions').innerHTML =
      '<div class="empty"><div class="empty-emoji">🔍</div>Aucun événement ne correspond à votre recherche.<br>Essayez d\'élargir les filtres.</div>';
    return;
  }

  const days = state.day === 'all' ? ['08','09','10'] : [state.day];
  let html = '';

  days.forEach(d => {
    const items = filtered.filter(s => s.day === d);
    if(!items.length) return;
    items.sort((a,b) => timeToMinutes(a.start) - timeToMinutes(b.start));

    html += '<div class="day-group"><div class="day-header">' + DAY_LABELS[d] + ' · ' + items.length + '</div>';

    items.forEach(s => {
      const tags = [];
      if(s.complet) tags.push('<span class="tag tag-complet">Complet</span>');
      if(s.prix === 'payant') tags.push('<span class="tag tag-prix">Payant</span>');
      if(s.prix === 'libre') tags.push('<span class="tag tag-libre">Entrée libre</span>');
      if((s.tags||[]).includes('fort')) tags.push('<span class="tag tag-fort">★ Temps fort</span>');
      if((s.tags||[]).includes('jeunesse')) tags.push('<span class="tag tag-jeunesse">Jeunesse</span>');

      const endStr = s.end ? '<div class="card-time-end">→ ' + s.end + '</div>' : '';
      const detail = s.detail ? '<div class="card-detail">' + escapeHtml(s.detail) + '</div>' : '';
      const tagsHtml = tags.length ? '<div class="card-tags">' + tags.join('') + '</div>' : '';

      html += '<div class="card ' + s.cat + '">' +
        '<div><div class="card-time">' + s.start + '</div>' + endStr + '</div>' +
        '<div class="card-body">' +
          '<div class="card-cat">' + (CAT_LABELS[s.cat] || s.cat) + '</div>' +
          '<div class="card-title">' + escapeHtml(s.title) + '</div>' +
          '<div class="card-lieu">' + escapeHtml(s.lieu) + '</div>' +
          detail +
          tagsHtml +
        '</div>' +
      '</div>';
    });
    html += '</div>';
  });

  document.getElementById('sessions').innerHTML = html;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

document.querySelectorAll('#dayFilters .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    state.day = btn.dataset.day;
    document.querySelectorAll('#dayFilters .pill').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});

document.querySelectorAll('#catFilters .pill').forEach(btn => {
  btn.addEventListener('click', () => {
    const c = btn.dataset.cat;
    if(state.cats.has(c)){
      state.cats.delete(c);
      btn.classList.remove('cat-active');
      btn.classList.remove('active');
    } else {
      state.cats.add(c);
      if(c === 'fort') btn.classList.add('active');
      else btn.classList.add('cat-active');
    }
    render();
  });
});

const searchInput = document.getElementById('search');
const searchClear = document.getElementById('searchClear');
searchInput.addEventListener('input', e => {
  state.query = e.target.value;
  searchClear.classList.toggle('active', !!state.query);
  render();
});
searchClear.addEventListener('click', () => {
  searchInput.value = '';
  state.query = '';
  searchClear.classList.remove('active');
  render();
});

document.getElementById('reset').addEventListener('click', () => {
  state.day = 'all';
  state.cats.clear();
  state.query = '';
  searchInput.value = '';
  searchClear.classList.remove('active');
  document.querySelectorAll('#dayFilters .pill').forEach(b => b.classList.remove('active'));
  document.querySelector('#dayFilters .pill[data-day="all"]').classList.add('active');
  document.querySelectorAll('#catFilters .pill').forEach(b => { b.classList.remove('cat-active'); b.classList.remove('active'); });
  render();
});

document.getElementById('legendBtn').addEventListener('click', () => {
  const leg = document.getElementById('legend');
  leg.classList.toggle('open');
  document.getElementById('legendBtn').textContent =
    leg.classList.contains('open') ? 'Masquer la légende' : 'Voir la légende des couleurs';
});

render();
</script>
